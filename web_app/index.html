<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portals · nether/overworld converter</title>
    <!-- Tailwind (browser version) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- custom styles (all colors defined here) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-body text-body antialiased transition-colors duration-200">
    <div class="container max-w-md mx-auto p-4 min-h-screen flex items-center justify-center">
        <div class="w-full">
            <!-- header with dark mode toggle -->
            <div class="flex justify-between items-center mb-6">
                <h1 class="font-minecraftia text-4xl tracking-wider text-accent drop-shadow-[0_4px_0_var(--shadow-color)] flex items-center gap-3">
                    <i class="fas fa-ghost text-portal"></i> portals
                </h1>
                <button id="darkModeToggle" class="w-12 h-12 bg-surface border-2 border-border text-body text-2xl flex items-center justify-center shadow-pixel hover:bg-accent-dark transition-all">
                    <i class="fas fa-sun"></i>
                </button>
            </div>

            <!-- main card -->
            <div class="bg-card border-4 border-border shadow-pixel p-6">
                <!-- direction toggle -->
                <div class="flex gap-2 mb-6">
                    <button id="toNether" class="flex-1 py-3 bg-surface border-2 border-border font-minecraftia uppercase tracking-wide shadow-pixel active:translate-y-1 active:shadow-none transition-all" data-active="true">
                        🌑 Overworld → Nether
                    </button>
                    <button id="toOverworld" class="flex-1 py-3 bg-surface border-2 border-border font-minecraftia uppercase tracking-wide shadow-pixel active:translate-y-1 active:shadow-none transition-all">
                        🌋 Nether → Overworld
                    </button>
                </div>

                <!-- inputs -->
                <div class="space-y-4">
                    <div>
                        <label class="font-minecraftia text-2xl text-muted">X (east/west)</label>
                        <input type="text" id="xInput" value="128" placeholder="0" class="w-full bg-input border-4 border-input-border text-2xl p-3 font-minecraftia focus:border-accent outline-none shadow-inner">
                    </div>
                    <div>
                        <label class="font-minecraftia text-2xl text-muted">Y (optional)</label>
                        <input type="text" id="yInput" value="64" placeholder="64" class="w-full bg-input border-4 border-input-border text-2xl p-3 font-minecraftia focus:border-accent outline-none shadow-inner">
                    </div>
                    <div>
                        <label class="font-minecraftia text-2xl text-muted">Z (south/north)</label>
                        <input type="text" id="zInput" value="128" placeholder="0" class="w-full bg-input border-4 border-input-border text-2xl p-3 font-minecraftia focus:border-accent outline-none shadow-inner">
                    </div>
                </div>

                <!-- convert button -->
                <button id="convertBtn" class="w-full mt-6 bg-accent border-b-4 border-accent-dark text-white text-2xl py-3 font-minecraftia tracking-widest flex items-center justify-center gap-3 shadow-pixel active:translate-y-1 active:border-b-0 transition-all">
                    <i class="fas fa-rotate text-2xl"></i> CONVERT
                </button>

                <!-- output section -->
                <div class="mt-8">
                    <h3 class="font-minecraftia text-3xl text-body border-b-2 border-border pb-1 mb-4 flex items-center gap-2">
                        <i class="fas fa-arrow-right"></i> PORTAL COORDS
                    </h3>

                    <!-- individual lines -->
                    <div class="flex items-center gap-2 bg-surface border-2 border-border p-2 mb-2">
                        <span class="font-minecraftia text-2xl w-10 text-muted">X</span>
                        <span id="outputX" class="flex-1 font-minecraftia text-2xl bg-input px-3 py-1 border border-input-border text-right">0</span>
                        <button class="copy-btn w-12 h-12 bg-input border-2 border-input-border text-body text-xl flex items-center justify-center hover:border-accent" data-copy="x">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-2 bg-surface border-2 border-border p-2 mb-2">
                        <span class="font-minecraftia text-2xl w-10 text-muted">Y</span>
                        <span id="outputY" class="flex-1 font-minecraftia text-2xl bg-input px-3 py-1 border border-input-border text-right">-</span>
                        <button class="copy-btn w-12 h-12 bg-input border-2 border-input-border text-body text-xl flex items-center justify-center hover:border-accent" data-copy="y">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-2 bg-surface border-2 border-border p-2 mb-4">
                        <span class="font-minecraftia text-2xl w-10 text-muted">Z</span>
                        <span id="outputZ" class="flex-1 font-minecraftia text-2xl bg-input px-3 py-1 border border-input-border text-right">0</span>
                        <button class="copy-btn w-12 h-12 bg-input border-2 border-input-border text-body text-xl flex items-center justify-center hover:border-accent" data-copy="z">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>

                    <!-- combined row -->
                    <div class="flex items-center gap-2 bg-combined border-2 border-combined-border p-2">
                        <span class="font-minecraftia text-2xl w-10 text-white">xyz</span>
                        <span id="outputCombined" class="flex-1 font-minecraftia text-2xl bg-input px-3 py-1 border border-input-border text-right">0 0 0</span>
                        <button class="copy-btn w-12 h-12 bg-input border-2 border-input-border text-body text-xl flex items-center justify-center hover:border-accent" data-copy="combined">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <p class="font-minecraftia text-center mt-6 text-muted text-xl">
                ⚡ Y stays the same · divide/multiply X & Z by 8 ⚡
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
